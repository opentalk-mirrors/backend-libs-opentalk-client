[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
authors = ["OpenTalk Team <mail@opentalk.eu>"]
homepage = "https://opentalk.eu/"
repository = "https://gitlab.opencode.de/opentalk/libs/opentalk-client"

[workspace.dependencies]
http = "1.2.0"
http-request-derive = "0.4.0"
httpmock = "0.7.0"
opentalk-types-api-v1 = "0.35.0"
opentalk-types-common = "0.32.2"
pretty_assertions = "1.4.1"
reqwest = "0.12.12"
snafu = "0.8.5"
tokio = "1.43.0"
